; PlatformIO Project Configuration
; 
; Setup:
;   1. Install VS Code
;   2. Install PlatformIO extension in VS Code
;   3. Create new project (or just create a folder with this file)
;   4. Put the firmware code in src/main.cpp
;   5. Click the Upload button (arrow icon in bottom toolbar)

[env:esp32c3]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    knolleary/PubSubClient@^2.8

; Upload settings
upload_port = COM5

; Optional: faster upload
upload_speed = 921600

; Optional: enable OTA updates later
; extra_scripts = post:ota_upload.py